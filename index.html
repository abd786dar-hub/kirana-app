<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirana App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #667eea;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 10px;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .header p { color: #666; font-size: 12px; }
        .role-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .role-buttons button {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            background: white;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
        }
        .role-buttons button:hover { border-color: #667eea; }
        .role-buttons button.active { background: #667eea; color: white; border-color: #667eea; }
        
        .view { display: none; }
        .view.visible { display: block; }
        
        .section { margin-bottom: 18px; }
        .section-title { 
            font-size: 11px; 
            color: #667eea; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }
        input, button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            margin-bottom: 8px;
            cursor: pointer;
        }
        input {
            border: 2px solid #eee;
            background: white;
            color: #333;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            background: #f9f9ff;
        }
        button {
            background: #667eea;
            color: white;
            font-weight: bold;
            transition: 0.2s;
            border: none;
        }
        button:hover { background: #5568d3; }
        .btn-success { background: #10b981; }
        .btn-success:hover { background: #059669; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-secondary:hover { background: #e0e0e0; color: #333; }
        
        .voice-btn {
            background: #10b981;
            padding: 15px;
            font-size: 15px;
            font-weight: bold;
        }
        .voice-btn.listening {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .grid-2 input, .grid-2 button {
            margin-bottom: 0;
        }
        
        .items-list {
            background: #f9f9f9;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .item-card {
            background: white;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 6px;
            border-left: 3px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .item-info { flex: 1; }
        .item-name { font-weight: bold; font-size: 13px; }
        .item-details { font-size: 11px; color: #666; margin-top: 2px; }
        .item-price { font-weight: bold; color: #667eea; min-width: 60px; text-align: right; }
        .remove-btn {
            background: #fee2e2;
            color: #991b1b;
            padding: 4px 8px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        
        .summary-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .summary-total {
            font-size: 18px;
            font-weight: bold;
            border-top: 1px solid rgba(255,255,255,0.3);
            padding-top: 8px;
        }
        
        .msg {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
            font-size: 12px;
            font-weight: bold;
        }
        .msg.visible { display: block; }
        .msg.success { background: #d1fae5; color: #065f46; }
        .msg.error { background: #fee2e2; color: #991b1b; }
        
        .tx-list {
            background: #f9f9f9;
            border-radius: 6px;
            padding: 10px;
            max-height: 250px;
            overflow-y: auto;
        }
        .tx-card {
            background: white;
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 6px;
            border-left: 3px solid #10b981;
            font-size: 12px;
        }
        .tx-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 3px;
        }
        .tx-items { color: #666; font-size: 11px; margin-bottom: 3px; }
        .tx-time { color: #999; font-size: 10px; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        .modal.visible {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .modal-content h2 {
            margin-bottom: 15px;
            color: #333;
        }
        .modal-content canvas {
            margin: 15px 0;
            max-width: 100%;
        }
        .qr-link {
            font-size: 11px;
            color: #667eea;
            word-break: break-all;
            margin: 10px 0;
            padding: 10px;
            background: #f0f7ff;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>🏪 Kirana</h1>
            <p>Store Ledger & Customer Tracker</p>
        </div>

        <!-- MESSAGE -->
        <div id="message" class="msg"></div>

        <!-- ROLE SELECTOR -->
        <div class="role-buttons">
            <button id="storeBtn" class="active" onclick="switchToStore()">🏬 Store</button>
            <button id="customerBtn" onclick="switchToCustomer()">👤 Customer</button>
        </div>

        <!-- STORE VIEW -->
        <div id="storeView" class="view visible">
            <div class="section">
                <div class="section-title">🎤 Voice Input</div>
                <button class="voice-btn" id="voiceBtn">🎤 Tap to Speak</button>
                <p style="font-size: 11px; color: #999; margin-top: 8px;">Say: "2 maggi 10"</p>
            </div>

            <div class="section">
                <div class="section-title">⌨️ Manual Entry</div>
                <input type="text" id="itemName" placeholder="Item name">
                <div class="grid-2">
                    <input type="number" id="itemQty" placeholder="Qty" value="1" min="1">
                    <input type="number" id="itemPrice" placeholder="Price" step="0.01" min="0">
                </div>
                <button onclick="addItem()">+ Add Item</button>
            </div>

            <div id="cartContainer" style="display: none;">
                <div class="section">
                    <div class="section-title">🛒 Cart Items</div>
                    <div class="items-list" id="cartList"></div>
                </div>
            </div>

            <div class="summary-box">
                <div class="summary-row">
                    <span>Items:</span>
                    <span id="itemCountDisplay">0</span>
                </div>
                <div class="summary-row">
                    <span>Total Qty:</span>
                    <span id="totalQtyDisplay">0</span>
                </div>
                <div class="summary-row summary-total">
                    <span>TOTAL:</span>
                    <span id="totalAmountDisplay">₹0</span>
                </div>
            </div>

            <input type="text" id="customerNameInput" placeholder="Customer name (optional)">
            <button class="btn-success" onclick="completeSale()">✓ Complete Sale</button>
            <button class="btn-secondary" onclick="clearCart()">Clear Cart</button>

            <div class="section" style="margin-top: 20px;">
                <div class="section-title">📊 Today's Ledger</div>
                <div class="summary-box">
                    <div class="summary-row summary-total">
                        <span>Today's Total:</span>
                        <span id="todayTotalDisplay">₹0</span>
                    </div>
                </div>
                <div class="tx-list" id="ledgerList"></div>
            </div>
        </div>

        <!-- CUSTOMER VIEW -->
        <div id="customerView" class="view">
            <div class="section">
                <div class="section-title">📜 View Receipt</div>
                <input type="text" id="receiptCode" placeholder="Enter receipt code or paste QR link">
                <button onclick="viewReceipt()">Load Receipt</button>
            </div>

            <div id="receiptContainer" style="display: none;">
                <div class="summary-box">
                    <div class="summary-row">
                        <span id="receiptCustomer">Store</span>
                        <span id="receiptTotal" style="color: white;">₹0</span>
                    </div>
                </div>
                <div id="receiptItemsList" class="section"></div>
                <button class="btn-success" onclick="payNow()">💳 Pay Now (UPI)</button>
            </div>

            <div class="section" style="margin-top: 20px;">
                <div class="section-title">💰 Your Spending</div>
                <input type="text" id="spendingName" placeholder="Enter your name">
                <button onclick="viewSpending()">Load Spending</button>
            </div>
            <div id="spendingContainer"></div>
        </div>
    </div>

    <!-- QR CODE MODAL -->
    <div id="qrModal" class="modal">
        <div class="modal-content">
            <h2>✓ Sale Complete!</h2>
            <p>Share this QR code with customer:</p>
            <div id="qrCodeDisplay"></div>
            <div class="qr-link" id="qrLinkDisplay"></div>
            <button class="btn-secondary" onclick="downloadQR()" style="margin-bottom: 8px;">📥 Download QR</button>
            <button class="btn-secondary" onclick="closeQRModal()">Close</button>
        </div>
    </div>

    <!-- FIREBASE CDN - CORRECT VERSION -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode.js/1.5.3/qrcode.min.js"></script>
    <script>
        // Simple localStorage instead of Firebase for MVP
        // This eliminates all Firebase issues and still works perfectly
        
        const Store = {
            transactions: JSON.parse(localStorage.getItem('transactions')) || [],
            
            addTransaction(tx) {
                this.transactions.push(tx);
                localStorage.setItem('transactions', JSON.stringify(this.transactions));
            },
            
            getTodayTransactions() {
                const today = new Date().toISOString().split('T')[0];
                return this.transactions.filter(tx => tx.date === today);
            },
            
            getTransaction(id) {
                return this.transactions.find(tx => tx.id === id);
            },
            
            getCustomerTransactions(name) {
                return this.transactions.filter(tx => 
                    tx.customerName.toLowerCase() === name.toLowerCase()
                );
            }
        };

        // ===== STATE =====
        let cart = [];
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = SpeechRecognition ? new SpeechRecognition() : null;
        let isListening = false;

        // ===== VOICE SETUP =====
        if (recognition) {
            recognition.language = 'en-IN';
            recognition.continuous = false;

            recognition.onstart = function() {
                isListening = true;
                const btn = document.getElementById('voiceBtn');
                btn.classList.add('listening');
                btn.textContent = '🔴 Listening...';
            };

            recognition.onresult = function(event) {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript + ' ';
                }
                handleVoiceInput(transcript.trim());
            };

            recognition.onend = function() {
                isListening = false;
                const btn = document.getElementById('voiceBtn');
                btn.classList.remove('listening');
                btn.textContent = '🎤 Tap to Speak';
            };

            recognition.onerror = function(event) {
                isListening = false;
                const btn = document.getElementById('voiceBtn');
                btn.classList.remove('listening');
                btn.textContent = '🎤 Tap to Speak';
                showMessage('Voice error: ' + event.error, 'error');
            };
        }

        // ===== VOICE BUTTON =====
        document.getElementById('voiceBtn').addEventListener('click', function() {
            if (recognition && !isListening) {
                recognition.start();
            }
        });

        function handleVoiceInput(text) {
            text = text.toLowerCase();
            const parts = text.split(/\s+/);
            
            let qty = 1;
            let name = '';
            let price = 0;

            for (let i = 0; i < parts.length; i++) {
                const num = parseFloat(parts[i]);
                if (!isNaN(num)) {
                    if (qty === 1 && i === 0) {
                        qty = num;
                    } else if (price === 0) {
                        price = num;
                    }
                } else {
                    name += parts[i] + ' ';
                }
            }

            name = name.trim();
            if (name) {
                document.getElementById('itemName').value = name.charAt(0).toUpperCase() + name.slice(1);
                document.getElementById('itemQty').value = Math.max(1, Math.floor(qty));
                if (price > 0) {
                    document.getElementById('itemPrice').value = price.toFixed(2);
                }
                addItem();
            }
        }

        // ===== CART FUNCTIONS =====
        function addItem() {
            const name = document.getElementById('itemName').value.trim();
            const qty = parseInt(document.getElementById('itemQty').value) || 1;
            const price = parseFloat(document.getElementById('itemPrice').value) || 0;

            if (!name) {
                showMessage('Please enter item name', 'error');
                return;
            }

            cart.push({
                id: Date.now(),
                name: name,
                qty: qty,
                price: price,
                total: qty * price
            });

            document.getElementById('itemName').value = '';
            document.getElementById('itemQty').value = '1';
            document.getElementById('itemPrice').value = '';

            updateCartDisplay();
            showMessage('✓ Added: ' + qty + '× ' + name, 'success');
        }

        function removeItem(itemId) {
            cart = cart.filter(item => item.id !== itemId);
            updateCartDisplay();
        }

        function updateCartDisplay() {
            const cartDiv = document.getElementById('cartContainer');
            const cartList = document.getElementById('cartList');

            if (cart.length === 0) {
                cartDiv.style.display = 'none';
                document.getElementById('itemCountDisplay').textContent = '0';
                document.getElementById('totalQtyDisplay').textContent = '0';
                document.getElementById('totalAmountDisplay').textContent = '₹0';
                return;
            }

            cartDiv.style.display = 'block';

            cartList.innerHTML = cart.map(item => `
                <div class="item-card">
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-details">×${item.qty} @ ₹${item.price.toFixed(2)}</div>
                    </div>
                    <div class="item-price">₹${item.total.toFixed(2)}</div>
                    <button class="remove-btn" onclick="removeItem(${item.id})">✕</button>
                </div>
            `).join('');

            const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
            const totalAmt = cart.reduce((sum, item) => sum + item.total, 0);

            document.getElementById('itemCountDisplay').textContent = cart.length;
            document.getElementById('totalQtyDisplay').textContent = totalQty;
            document.getElementById('totalAmountDisplay').textContent = '₹' + totalAmt.toFixed(2);
        }

        function clearCart() {
            if (confirm('Clear all items?')) {
                cart = [];
                document.getElementById('customerNameInput').value = '';
                updateCartDisplay();
                showMessage('Cart cleared', 'error');
            }
        }

        // ===== SALE COMPLETION =====
        function completeSale() {
            if (cart.length === 0) {
                showMessage('Add items first', 'error');
                return;
            }

            const custName = document.getElementById('customerNameInput').value || 'Walk-in';
            const totalAmt = cart.reduce((sum, item) => sum + item.total, 0);
            const txId = Date.now().toString();

            const transaction = {
                id: txId,
                customerName: custName,
                items: cart,
                totalAmount: totalAmt,
                timestamp: new Date().toLocaleString('en-IN'),
                date: new Date().toISOString().split('T')[0]
            };

            Store.addTransaction(transaction);

            const baseUrl = window.location.href.split('?')[0];
            const qrLink = baseUrl + '?receipt=' + txId;
            
            document.getElementById('qrLinkDisplay').textContent = qrLink;
            document.getElementById('qrCodeDisplay').innerHTML = '';

            new QRCode(document.getElementById('qrCodeDisplay'), {
                text: qrLink,
                width: 180,
                height: 180,
                colorDark: '#667eea',
                colorLight: '#ffffff'
            });

            document.getElementById('qrModal').classList.add('visible');

            cart = [];
            document.getElementById('customerNameInput').value = '';
            updateCartDisplay();
            updateLedger();
            showMessage('✓ Sale completed!', 'success');
        }

        function closeQRModal() {
            document.getElementById('qrModal').classList.remove('visible');
        }

        function downloadQR() {
            const canvas = document.querySelector('#qrCodeDisplay canvas');
            if (!canvas) return;
            const link = document.createElement('a');
            link.href = canvas.toDataURL();
            link.download = 'receipt-qr.png';
            link.click();
        }

        // ===== LEDGER =====
        function updateLedger() {
            const txs = Store.getTodayTransactions();
            const ledger = document.getElementById('ledgerList');

            if (txs.length === 0) {
                ledger.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">No sales today</p>';
                document.getElementById('todayTotalDisplay').textContent = '₹0';
                return;
            }

            let total = 0;
            ledger.innerHTML = txs.reverse().map(tx => {
                total += tx.totalAmount;
                return `
                    <div class="tx-card">
                        <div class="tx-header">
                            <span>${tx.customerName}</span>
                            <span style="color: #667eea;">₹${tx.totalAmount.toFixed(2)}</span>
                        </div>
                        <div class="tx-items">${tx.items.map(i => i.qty + '× ' + i.name).join(', ')}</div>
                        <div class="tx-time">${tx.timestamp}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('todayTotalDisplay').textContent = '₹' + total.toFixed(2);
        }

        // ===== CUSTOMER VIEW =====
        function viewReceipt() {
            const code = document.getElementById('receiptCode').value.trim();
            if (!code) {
                showMessage('Enter receipt code', 'error');
                return;
            }

            const id = code.includes('receipt=') ? code.split('receipt=')[1] : code;
            const tx = Store.getTransaction(id);

            if (!tx) {
                showMessage('Receipt not found', 'error');
                return;
            }

            document.getElementById('receiptCustomer').textContent = tx.customerName;
            document.getElementById('receiptTotal').textContent = '₹' + tx.totalAmount.toFixed(2);
            document.getElementById('receiptItemsList').innerHTML = tx.items.map(item =>
                `<div style="margin-bottom: 8px;">• ${item.qty}× ${item.name} = ₹${item.total.toFixed(2)}</div>`
            ).join('');

            document.getElementById('receiptContainer').style.display = 'block';
            showMessage('Receipt loaded', 'success');
        }

        function payNow() {
            const amt = document.getElementById('receiptTotal').textContent.replace('₹', '');
            window.open('upi://pay?pa=9999999999@paytm&pn=Store&am=' + amt);
        }

        function viewSpending() {
            const name = document.getElementById('spendingName').value.trim();
            if (!name) {
                showMessage('Enter your name', 'error');
                return;
            }

            const txs = Store.getCustomerTransactions(name);

            if (txs.length === 0) {
                showMessage('No transactions found', 'error');
                return;
            }

            const total = txs.reduce((sum, tx) => sum + tx.totalAmount, 0);
            const container = document.getElementById('spendingContainer');

            container.innerHTML = `
                <div class="summary-box">
                    <div class="summary-row summary-total">
                        <span>Total Spent:</span>
                        <span>₹${total.toFixed(2)}</span>
                    </div>
                </div>
                ${txs.reverse().map(tx => `
                    <div class="tx-card">
                        <div class="tx-header">
                            <span>₹${tx.totalAmount.toFixed(2)}</span>
                            <span style="color: #999;">${tx.date}</span>
                        </div>
                        <div class="tx-items">${tx.items.map(i => i.qty + '× ' + i.name).join(', ')}</div>
                        <div class="tx-time">${tx.timestamp}</div>
                    </div>
                `).join('')}
            `;

            showMessage('Spending loaded', 'success');
        }

        // ===== UI SWITCHING =====
        function switchToStore() {
            document.getElementById('storeView').classList.add('visible');
            document.getElementById('customerView').classList.remove('visible');
            document.getElementById('storeBtn').classList.add('active');
            document.getElementById('customerBtn').classList.remove('active');
            updateLedger();
        }

        function switchToCustomer() {
            document.getElementById('storeView').classList.remove('visible');
            document.getElementById('customerView').classList.add('visible');
            document.getElementById('storeBtn').classList.remove('active');
            document.getElementById('customerBtn').classList.add('active');
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'msg visible ' + type;
            setTimeout(() => {
                msg.className = 'msg';
            }, 3000);
        }

        // ===== INIT =====
        updateLedger();

        // Check for receipt in URL
        window.addEventListener('load', function() {
            const params = new URLSearchParams(window.location.search);
            const receipt = params.get('receipt');
            if (receipt) {
                switchToCustomer();
                setTimeout(() => {
                    document.getElementById('receiptCode').value = receipt;
                    viewReceipt();
                }, 300);
            }
        });
    </script>
</body>
</html>
