<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirana App</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode.js/1.5.3/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-height: 95vh;
            overflow-y: auto;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 15px;
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 5px;
        }
        .header p {
            color: #666;
            font-size: 13px;
        }
        .role-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .role-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .role-btn:hover {
            border-color: #667eea;
        }
        .role-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .view {
            display: none;
        }
        .view.active {
            display: block;
        }
        .section {
            margin-bottom: 18px;
        }
        .section-title {
            font-size: 12px;
            color: #667eea;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }
        input, button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            margin-bottom: 8px;
            cursor: pointer;
        }
        input {
            border: 2px solid #eee;
            background: white;
            color: #333;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            background: #f9f9ff;
        }
        button {
            background: #667eea;
            color: white;
            font-weight: 600;
            transition: 0.2s;
            border: none;
        }
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .btn-success { background: #10b981; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-secondary:hover { background: #e0e0e0; color: #333; }
        
        .voice-btn {
            background: #10b981;
            padding: 16px;
            font-size: 15px;
            font-weight: 700;
        }
        .voice-btn.listening {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        
        .items-list {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        .item-card {
            background: white;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 6px;
            border-left: 3px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
        .item-info {
            flex: 1;
        }
        .item-name {
            font-weight: 600;
            color: #333;
        }
        .item-details {
            font-size: 11px;
            color: #666;
            margin-top: 3px;
        }
        .item-price {
            color: #667eea;
            font-weight: 700;
            margin-right: 10px;
            min-width: 50px;
            text-align: right;
        }
        .remove-btn {
            background: #fee2e2;
            color: #991b1b;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            border: none;
            cursor: pointer;
        }
        
        .summary-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .summary-total {
            border-top: 1px solid rgba(255,255,255,0.3);
            padding-top: 8px;
            font-size: 18px;
            font-weight: 700;
        }
        
        .tx-list {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
        }
        .tx-item {
            background: white;
            padding: 10px;
            margin-bottom: 6px;
            border-radius: 6px;
            border-left: 3px solid #10b981;
            font-size: 12px;
        }
        .tx-header {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .tx-items {
            color: #666;
            font-size: 11px;
            margin-bottom: 3px;
        }
        .tx-time {
            color: #999;
            font-size: 10px;
        }
        
        .status-msg {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 12px;
            display: none;
        }
        .status-msg.show { display: block; }
        .status-success { background: #d1fae5; color: #065f46; }
        .status-error { background: #fee2e2; color: #991b1b; }
        
        .qr-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        .qr-modal.show {
            display: flex;
        }
        .qr-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        .qr-box h2 {
            margin-bottom: 15px;
            color: #333;
        }
        .qr-box canvas {
            margin: 15px 0;
            max-width: 100%;
        }
        .qr-link {
            color: #667eea;
            font-size: 11px;
            word-break: break-all;
            margin: 10px 0;
        }
        
        .empty {
            text-align: center;
            padding: 30px 20px;
            color: #999;
        }
        
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .row-2 input, .row-2 button {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <h1>🏪 Kirana</h1>
            <p>Store Ledger & Customer Tracker</p>
        </div>

        <!-- STATUS MESSAGE -->
        <div id="statusMsg" class="status-msg"></div>

        <!-- ROLE SELECTOR -->
        <div class="role-buttons">
            <button class="role-btn active" id="storeRoleBtn">🏬 Store</button>
            <button class="role-btn" id="customerRoleBtn">👤 Customer</button>
        </div>

        <!-- ==================== STORE VIEW ==================== -->
        <div id="storeView" class="view active">
            <!-- ENTRY SECTION -->
            <div class="section">
                <div class="section-title">🎤 Voice Entry</div>
                <button class="voice-btn" id="voiceBtn">🎤 Tap to Speak</button>
                <p style="font-size: 11px; color: #999; margin-top: 8px;">Say: "2 maggi 10" (qty item price)</p>
            </div>

            <!-- MANUAL ENTRY -->
            <div class="section">
                <div class="section-title">⌨️ Manual Entry</div>
                <div class="row-2">
                    <input type="text" id="itemName" placeholder="Item">
                    <input type="number" id="itemQty" placeholder="Qty" value="1" min="1">
                </div>
                <input type="number" id="itemPrice" placeholder="Price (₹)" step="0.01" min="0">
                <button onclick="addItem()">+ Add Item</button>
            </div>

            <!-- ITEMS CART -->
            <div id="cartSection" style="display: none;">
                <div class="section">
                    <div class="section-title">🛒 Cart Items</div>
                    <div class="items-list" id="itemsList"></div>
                </div>
            </div>

            <!-- SUMMARY -->
            <div class="summary-box">
                <div class="summary-row">
                    <span>Items:</span>
                    <span id="itemCountDisplay">0</span>
                </div>
                <div class="summary-row">
                    <span>Total Qty:</span>
                    <span id="totalQtyDisplay">0</span>
                </div>
                <div class="summary-row summary-total">
                    <span>TOTAL:</span>
                    <span id="totalAmountDisplay">₹0</span>
                </div>
            </div>

            <!-- CUSTOMER NAME & CHECKOUT -->
            <input type="text" id="customerName" placeholder="Customer name (optional)">
            <button class="btn-success" onclick="completeSale()">✓ Complete Sale</button>
            <button class="btn-secondary" onclick="clearCart()" style="margin-top: 6px;">Clear Cart</button>

            <!-- LEDGER -->
            <div class="section" style="margin-top: 20px;">
                <div class="section-title">📊 Today's Ledger</div>
                <div class="summary-box">
                    <div class="summary-row summary-total">
                        <span>Total Sales:</span>
                        <span id="todaySalesDisplay">₹0</span>
                    </div>
                </div>
                <div class="tx-list" id="txList"></div>
            </div>
        </div>

        <!-- ==================== CUSTOMER VIEW ==================== -->
        <div id="customerView" class="view">
            <!-- RECEIPT VIEW -->
            <div class="section">
                <div class="section-title">📜 View Receipt</div>
                <input type="text" id="receiptCode" placeholder="Enter receipt code or paste QR link">
                <button onclick="viewReceipt()">View Receipt</button>
            </div>

            <div id="receiptDisplay" style="display: none;">
                <div class="summary-box">
                    <div class="summary-row">
                        <span id="rxStoreName">Store</span>
                        <span id="rxAmount" style="color: #fff;">₹0</span>
                    </div>
                </div>
                <div id="rxItems" class="section"></div>
                <div style="color: #999; font-size: 11px; margin-bottom: 15px;" id="rxTime"></div>
                <button class="btn-success" onclick="payNow()">💳 Pay Now</button>
            </div>

            <!-- SPENDING TRACKER -->
            <div class="section" style="margin-top: 20px;">
                <div class="section-title">💰 Your Spending</div>
                <input type="text" id="spendingName" placeholder="Enter your name">
                <button onclick="viewSpending()">Load Spending</button>
            </div>
            <div id="spendingDisplay" class="section"></div>
        </div>
    </div>

    <!-- QR CODE MODAL -->
    <div id="qrModal" class="qr-modal">
        <div class="qr-box">
            <h2>✓ Sale Complete!</h2>
            <p>Share this QR with customer:</p>
            <div id="qrCodeContainer"></div>
            <div class="qr-link" id="qrCodeLink"></div>
            <button class="btn-secondary" onclick="downloadQR()" style="margin-bottom: 8px;">📥 Download QR</button>
            <button class="btn-secondary" onclick="closeQR()">Close</button>
        </div>
    </div>

    <script>
        // ============ FIREBASE CONFIG ============
        const firebaseConfig = {
            apiKey: "AIzaSyAqqvJtnVu4-Z_RbKE2fjn4mm62p4U55UE",
            authDomain: "kirana-64484.firebaseapp.com",
            projectId: "kirana-64484",
            storageBucket: "kirana-64484.firebasestorage.app",
            messagingSenderId: "863149395918",
            appId: "1:863149395918:web:cb59d030a90b0f193be59f",
            measurementId: "G-FXHT6Q742W"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        auth.signInAnonymously();

        // ============ GLOBAL STATE ============
        let cart = [];
        let recognition = null;
        let isListening = false;

        // ============ SETUP VOICE ============
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.language = 'en-IN';
            recognition.continuous = false;
            
            recognition.onstart = function() {
                isListening = true;
                document.getElementById('voiceBtn').classList.add('listening');
                document.getElementById('voiceBtn').textContent = '🔴 Listening...';
            };
            
            recognition.onresult = function(event) {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript + ' ';
                }
                handleVoiceInput(transcript);
            };
            
            recognition.onend = function() {
                isListening = false;
                document.getElementById('voiceBtn').classList.remove('listening');
                document.getElementById('voiceBtn').textContent = '🎤 Tap to Speak';
            };
            
            recognition.onerror = function(event) {
                showStatus('Voice error: ' + event.error, 'error');
                document.getElementById('voiceBtn').classList.remove('listening');
                document.getElementById('voiceBtn').textContent = '🎤 Tap to Speak';
            };
        }

        // ============ VOICE CONTROL ============
        document.getElementById('voiceBtn').addEventListener('click', function() {
            if (!recognition) {
                showStatus('Voice not supported', 'error');
                return;
            }
            if (!isListening) {
                recognition.start();
            }
        });

        function handleVoiceInput(text) {
            text = text.toLowerCase().trim();
            const parts = text.split(/\s+/);
            
            let qty = 1, item = '', price = 0;
            
            for (let i = 0; i < parts.length; i++) {
                const num = parseFloat(parts[i]);
                if (!isNaN(num)) {
                    if (qty === 1 && i === 0) qty = Math.max(1, Math.floor(num));
                    else if (price === 0) price = num;
                } else {
                    item += parts[i] + ' ';
                }
            }
            
            item = item.trim();
            if (item) {
                document.getElementById('itemName').value = item.charAt(0).toUpperCase() + item.slice(1);
                document.getElementById('itemQty').value = qty;
                if (price > 0) document.getElementById('itemPrice').value = price.toFixed(2);
                addItem();
            }
        }

        // ============ CART FUNCTIONS ============
        function addItem() {
            const name = document.getElementById('itemName').value.trim();
            const qty = parseInt(document.getElementById('itemQty').value) || 1;
            const price = parseFloat(document.getElementById('itemPrice').value) || 0;

            if (!name) {
                showStatus('Enter item name', 'error');
                return;
            }

            cart.push({ id: Date.now(), name, qty, price, total: qty * price });
            document.getElementById('itemName').value = '';
            document.getElementById('itemQty').value = '1';
            document.getElementById('itemPrice').value = '';
            updateCart();
            showStatus(`✓ Added: ${qty}× ${name}`, 'success');
        }

        function removeItem(id) {
            cart = cart.filter(item => item.id !== id);
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('itemsList');
            const section = document.getElementById('cartSection');

            if (cart.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            list.innerHTML = cart.map(item => `
                <div class="item-card">
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-details">×${item.qty} @ ₹${item.price.toFixed(2)}</div>
                    </div>
                    <div class="item-price">₹${item.total.toFixed(2)}</div>
                    <button class="remove-btn" onclick="removeItem(${item.id})">✕</button>
                </div>
            `).join('');

            const totalQty = cart.reduce((s, i) => s + i.qty, 0);
            const totalAmt = cart.reduce((s, i) => s + i.total, 0);

            document.getElementById('itemCountDisplay').textContent = cart.length;
            document.getElementById('totalQtyDisplay').textContent = totalQty;
            document.getElementById('totalAmountDisplay').textContent = '₹' + totalAmt.toFixed(2);
        }

        function clearCart() {
            if (confirm('Clear all items?')) {
                cart = [];
                document.getElementById('customerName').value = '';
                updateCart();
            }
        }

        // ============ COMPLETE SALE ============
        async function completeSale() {
            if (cart.length === 0) {
                showStatus('Add items first', 'error');
                return;
            }

            const cName = document.getElementById('customerName').value || 'Walk-in';
            const total = cart.reduce((s, i) => s + i.total, 0);
            const txId = Date.now().toString();

            try {
                await db.ref('transactions/' + txId).set({
                    id: txId,
                    customerName: cName,
                    items: cart,
                    totalAmount: total,
                    timestamp: new Date().toLocaleString('en-IN'),
                    date: new Date().toISOString().split('T')[0]
                });

                const link = window.location.origin + '?rx=' + txId;
                document.getElementById('qrCodeLink').textContent = link;
                document.getElementById('qrCodeContainer').innerHTML = '';
                
                new QRCode(document.getElementById('qrCodeContainer'), {
                    text: link,
                    width: 200,
                    height: 200,
                    colorDark: '#667eea',
                    colorLight: '#ffffff'
                });

                document.getElementById('qrModal').classList.add('show');
                cart = [];
                document.getElementById('customerName').value = '';
                updateCart();
                loadLedger();
                showStatus('Sale complete!', 'success');
            } catch (err) {
                showStatus('Error: ' + err.message, 'error');
            }
        }

        function closeQR() {
            document.getElementById('qrModal').classList.remove('show');
        }

        function downloadQR() {
            const canvas = document.querySelector('#qrCodeContainer canvas');
            const link = document.createElement('a');
            link.href = canvas.toDataURL();
            link.download = 'receipt.png';
            link.click();
        }

        // ============ LEDGER ============
        function loadLedger() {
            const today = new Date().toISOString().split('T')[0];
            db.ref('transactions').on('value', snapshot => {
                const data = snapshot.val();
                const txs = data ? Object.values(data).filter(tx => tx.date === today).reverse() : [];

                document.getElementById('txList').innerHTML = txs.length > 0 ? txs.map(tx => `
                    <div class="tx-item">
                        <div class="tx-header">
                            <span>${tx.customerName}</span>
                            <span style="color: #667eea;">₹${tx.totalAmount.toFixed(2)}</span>
                        </div>
                        <div class="tx-items">${tx.items.map(i => i.qty + '× ' + i.name).join(', ')}</div>
                        <div class="tx-time">${tx.timestamp}</div>
                    </div>
                `).join('') : '<div class="empty">No sales
