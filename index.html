<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirana</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #667eea;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 10px;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .header p { color: #666; font-size: 12px; }
        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            background: white;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
        }
        .btn:hover { border-color: #667eea; }
        .btn.active { background: #667eea; color: white; border-color: #667eea; }
        .content { display: none; }
        .content.show { display: block; }
        .section { margin-bottom: 20px; }
        .section-title { font-size: 12px; color: #667eea; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        input { width: 100%; padding: 10px; border: 2px solid #eee; border-radius: 6px; margin-bottom: 8px; font-size: 13px; }
        input:focus { outline: none; border-color: #667eea; background: #f9f9ff; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background: #667eea; color: white; font-weight: bold; cursor: pointer; margin-bottom: 8px; font-size: 13px; }
        button:hover { background: #5568d3; }
        .btn-success { background: #10b981; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .voice-btn { background: #10b981; padding: 15px; font-size: 16px; font-weight: bold; }
        .voice-btn.listening { background: #f59e0b; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .list { background: #f9f9f9; border-radius: 6px; padding: 10px; margin-bottom: 10px; }
        .item { background: white; padding: 10px; margin-bottom: 5px; border-radius: 6px; border-left: 3px solid #667eea; display: flex; justify-content: space-between; align-items: center; }
        .item-left { flex: 1; }
        .item-name { font-weight: bold; font-size: 13px; }
        .item-qty { font-size: 11px; color: #666; }
        .item-price { font-weight: bold; color: #667eea; }
        .remove { background: #fee2e2; color: #991b1b; padding: 4px 8px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; }
        .summary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .summary-total { font-size: 18px; font-weight: bold; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 8px; }
        .msg { padding: 10px; border-radius: 6px; margin-bottom: 15px; text-align: center; display: none; font-size: 12px; }
        .msg.show { display: block; }
        .msg-success { background: #d1fae5; color: #065f46; }
        .msg-error { background: #fee2e2; color: #991b1b; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 999; }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-box { background: white; padding: 30px; border-radius: 10px; text-align: center; width: 90%; max-width: 400px; }
        .modal-box h2 { margin-bottom: 15px; }
        .modal-box canvas { margin: 15px 0; }
        .tx-list { background: #f9f9f9; border-radius: 6px; padding: 10px; max-height: 250px; overflow-y: auto; }
        .tx { background: white; padding: 10px; margin-bottom: 5px; border-radius: 6px; border-left: 3px solid #10b981; font-size: 12px; }
        .tx-name { font-weight: bold; margin-bottom: 3px; }
        .tx-items { color: #666; font-size: 11px; margin-bottom: 3px; }
        .tx-time { color: #999; font-size: 10px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-2 input, .grid-2 button { margin-bottom: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏪 Kirana</h1>
            <p>Store Ledger & Customer Tracker</p>
        </div>

        <div id="msg" class="msg"></div>

        <div class="buttons">
            <button class="btn active" onclick="showStore()">🏬 Store</button>
            <button class="btn" onclick="showCustomer()">👤 Customer</button>
        </div>

        <!-- STORE VIEW -->
        <div id="store" class="content show">
            <div class="section">
                <div class="section-title">🎤 Voice</div>
                <button class="voice-btn" id="voice-btn">🎤 Tap to Speak</button>
                <p style="font-size: 11px; color: #999; margin-top: 8px;">Say: "2 maggi 10"</p>
            </div>

            <div class="section">
                <div class="section-title">⌨️ Type</div>
                <input type="text" id="name" placeholder="Item name">
                <div class="grid-2">
                    <input type="number" id="qty" placeholder="Qty" value="1" min="1">
                    <input type="number" id="price" placeholder="Price" min="0" step="0.01">
                </div>
                <button onclick="addItem()">+ Add</button>
            </div>

            <div id="cart-show" style="display: none;">
                <div class="section">
                    <div class="section-title">🛒 Items</div>
                    <div class="list" id="items"></div>
                </div>
            </div>

            <div class="summary">
                <div class="summary-row">
                    <span>Items:</span>
                    <span id="count">0</span>
                </div>
                <div class="summary-row">
                    <span>Total Qty:</span>
                    <span id="qty-total">0</span>
                </div>
                <div class="summary-row summary-total">
                    <span>TOTAL:</span>
                    <span id="amt">₹0</span>
                </div>
            </div>

            <input type="text" id="cust" placeholder="Customer name (optional)">
            <button class="btn-success" onclick="completeSale()">✓ Complete</button>
            <button class="btn-secondary" onclick="clearCart()">Clear</button>

            <div class="section" style="margin-top: 20px;">
                <div class="section-title">📊 Ledger</div>
                <div class="summary">
                    <div class="summary-row summary-total">
                        <span>Today:</span>
                        <span id="today">₹0</span>
                    </div>
                </div>
                <div class="tx-list" id="ledger"></div>
            </div>
        </div>

        <!-- CUSTOMER VIEW -->
        <div id="customer" class="content">
            <div class="section">
                <div class="section-title">📜 Receipt</div>
                <input type="text" id="rx-code" placeholder="Code or QR link">
                <button onclick="loadRx()">Load</button>
            </div>

            <div id="rx-show" style="display: none;">
                <div class="summary">
                    <div class="summary-row">
                        <span id="rx-name">Store</span>
                        <span id="rx-amt" style="color: white;">₹0</span>
                    </div>
                </div>
                <div id="rx-items" class="section"></div>
                <button class="btn-success" onclick="payNow()">💳 Pay</button>
            </div>

            <div class="section" style="margin-top: 20px;">
                <div class="section-title">💰 Spending</div>
                <input type="text" id="spend-name" placeholder="Your name">
                <button onclick="loadSpend()">Load</button>
            </div>
            <div id="spend-show"></div>
        </div>
    </div>

    <!-- QR MODAL -->
    <div id="qr-modal" class="modal">
        <div class="modal-box">
            <h2>✓ Sale Complete!</h2>
            <p>Share QR with customer:</p>
            <div id="qr"></div>
            <p id="qr-link" style="font-size: 11px; color: #667eea; word-break: break-all; margin: 10px 0;"></p>
            <button class="btn-secondary" onclick="downloadQR()" style="margin-bottom: 8px;">Download QR</button>
            <button class="btn-secondary" onclick="closeQR()">Close</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode.js/1.5.3/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>

    <script>
        // ===== FIREBASE INIT =====
        const firebaseConfig = {
            apiKey: "AIzaSyAqqvJtnVu4-Z_RbKE2fjn4mm62p4U55UE",
            authDomain: "kirana-64484.firebaseapp.com",
            projectId: "kirana-64484",
            storageBucket: "kirana-64484.firebasestorage.app",
            messagingSenderId: "863149395918",
            appId: "1:863149395918:web:cb59d030a90b0f193be59f",
            measurementId: "G-FXHT6Q742W"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        firebase.auth().signInAnonymously().catch(err => console.log('Auth error:', err));

        // ===== STATE =====
        let cart = [];
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = SpeechRecognition ? new SpeechRecognition() : null;
        let listening = false;

        if (recognition) {
            recognition.language = 'en-IN';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                listening = true;
                const btn = document.getElementById('voice-btn');
                btn.textContent = '🔴 Listening...';
                btn.classList.add('listening');
            };

            recognition.onresult = (e) => {
                let txt = '';
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    txt += e.results[i][0].transcript + ' ';
                }
                parseVoice(txt.trim());
            };

            recognition.onend = () => {
                listening = false;
                const btn = document.getElementById('voice-btn');
                btn.textContent = '🎤 Tap to Speak';
                btn.classList.remove('listening');
            };

            recognition.onerror = (e) => {
                listening = false;
                const btn = document.getElementById('voice-btn');
                btn.textContent = '🎤 Tap to Speak';
                btn.classList.remove('listening');
                showMsg('Voice error: ' + e.error, 'error');
            };
        }

        // ===== VOICE BUTTON =====
        document.getElementById('voice-btn').addEventListener('click', () => {
            if (recognition && !listening) {
                recognition.start();
            }
        });

        function parseVoice(text) {
            text = text.toLowerCase();
            const parts = text.split(/\s+/);
            let qty = 1, name = '', price = 0;

            for (let i = 0; i < parts.length; i++) {
                const n = parseFloat(parts[i]);
                if (!isNaN(n)) {
                    if (qty === 1 && i === 0) qty = n;
                    else if (price === 0) price = n;
                } else {
                    name += parts[i] + ' ';
                }
            }

            name = name.trim();
            if (name) {
                document.getElementById('name').value = name.charAt(0).toUpperCase() + name.slice(1);
                document.getElementById('qty').value = qty;
                if (price > 0) document.getElementById('price').value = price;
                addItem();
            }
        }

        // ===== CART =====
        function addItem() {
            const name = document.getElementById('name').value.trim();
            const qty = parseInt(document.getElementById('qty').value) || 1;
            const price = parseFloat(document.getElementById('price').value) || 0;

            if (!name) {
                showMsg('Enter item name', 'error');
                return;
            }

            cart.push({
                id: Date.now(),
                name: name,
                qty: qty,
                price: price,
                total: qty * price
            });

            document.getElementById('name').value = '';
            document.getElementById('qty').value = '1';
            document.getElementById('price').value = '';
            updateCart();
            showMsg('Added: ' + qty + '× ' + name, 'success');
        }

        function removeItem(id) {
            cart = cart.filter(i => i.id !== id);
            updateCart();
        }

        function updateCart() {
            const itemsDiv = document.getElementById('items');
            const cartDiv = document.getElementById('cart-show');

            if (cart.length === 0) {
                cartDiv.style.display = 'none';
                return;
            }

            cartDiv.style.display = 'block';
            itemsDiv.innerHTML = cart.map(i => `
                <div class="item">
                    <div class="item-left">
                        <div class="item-name">${i.name}</div>
                        <div class="item-qty">×${i.qty} @ ₹${i.price.toFixed(2)}</div>
                    </div>
                    <div class="item-price">₹${i.total.toFixed(2)}</div>
                    <button class="remove" onclick="removeItem(${i.id})">✕</button>
                </div>
            `).join('');

            const totalQty = cart.reduce((s, i) => s + i.qty, 0);
            const totalAmt = cart.reduce((s, i) => s + i.total, 0);

            document.getElementById('count').textContent = cart.length;
            document.getElementById('qty-total').textContent = totalQty;
            document.getElementById('amt').textContent = '₹' + totalAmt.toFixed(2);
        }

        function clearCart() {
            if (confirm('Clear cart?')) {
                cart = [];
                document.getElementById('cust').value = '';
                updateCart();
            }
        }

        // ===== SALE =====
        async function completeSale() {
            if (cart.length === 0) {
                showMsg('Add items first', 'error');
                return;
            }

            const custName = document.getElementById('cust').value || 'Walk-in';
            const totalAmt = cart.reduce((s, i) => s + i.total, 0);
            const txId = Date.now().toString();

            try {
                await db.ref('transactions/' + txId).set({
                    id: txId,
                    customerName: custName,
                    items: cart,
                    totalAmount: totalAmt,
                    timestamp: new Date().toLocaleString('en-IN'),
                    date: new Date().toISOString().split('T')[0]
                });

                const baseUrl = window.location.href.split('?')[0];
                const qrLink = baseUrl + '?rx=' + txId;
                document.getElementById('qr-link').textContent = qrLink;
                document.getElementById('qr').innerHTML = '';

                new QRCode(document.getElementById('qr'), {
                    text: qrLink,
                    width: 180,
                    height: 180,
                    colorDark: '#667eea',
                    colorLight: '#ffffff'
                });

                document.getElementById('qr-modal').classList.add('show');
                cart = [];
                document.getElementById('cust').value = '';
                updateCart();
                loadLedger();
                showMsg('Sale complete!', 'success');
            } catch (err) {
                showMsg('Error: ' + err.message, 'error');
            }
        }

        function closeQR() {
            document.getElementById('qr-modal').classList.remove('show');
        }

        function downloadQR() {
            const canvas = document.querySelector('#qr canvas');
            if (!canvas) return;
            const link = document.createElement('a');
            link.href = canvas.toDataURL();
            link.download = 'receipt-qr.png';
            link.click();
        }

        // ===== LEDGER =====
        function loadLedger() {
            const today = new Date().toISOString().split('T')[0];
            db.ref('transactions').on('value', (snapshot) => {
                const data = snapshot.val();
                const txs = data ? Object.values(data).filter(t => t.date === today).reverse() : [];

                let totalToday = 0;
                document.getElementById('ledger').innerHTML = txs.map(t => {
                    totalToday += t.totalAmount;
                    return `
                        <div class="tx">
                            <div class="tx-name">${t.customerName} <span style="float: right; color: #667eea;">₹${t.totalAmount.toFixed(2)}</span></div>
                            <div class="tx-items">${t.items.map(i => i.qty + '× ' + i.name).join(', ')}</div>
                            <div class="tx-time">${t.timestamp}</div>
                        </div>
                    `;
                }).join('');

                document.getElementById('today').textContent = '₹' + totalToday.toFixed(2);
            });
        }

        // ===== CUSTOMER =====
        async function loadRx() {
            const code = document.getElementById('rx-code').value.trim();
            if (!code) {
                showMsg('Enter code', 'error');
                return;
            }

            const id = code.includes('rx=') ? code.split('rx=')[1] : code;

            try {
                const snapshot = await db.ref('transactions/' + id).get();
                if (!snapshot.exists()) {
                    showMsg('Receipt not found', 'error');
                    return;
                }

                const tx = snapshot.val();
                document.getElementById('rx-name').textContent = tx.customerName;
                document.getElementById('rx-amt').textContent = '₹' + tx.totalAmount.toFixed(2);

                document.getElementById('rx-items').innerHTML = tx.items.map(i =>
                    `<div style="margin-bottom: 8px;">• ${i.qty}× ${i.name} = ₹${i.total.toFixed(2)}</div>`
                ).join('');

                document.getElementById('rx-show').style.display = 'block';
                showMsg('Receipt loaded', 'success');
            } catch (err) {
                showMsg('Error: ' + err.message, 'error');
            }
        }

        function payNow() {
            const amt = document.getElementById('rx-amt').textContent.replace('₹', '');
            window.open('upi://pay?pa=9999999999@paytm&pn=Store&am=' + amt);
        }

        async function loadSpend() {
            const name = document.getElementById('spend-name').value.trim();
            if (!name) {
                showMsg('Enter name', 'error');
                return;
            }

            try {
                const snapshot = await db.ref('transactions').get();
                const data = snapshot.val();

                if (!data) {
                    showMsg('No data', 'error');
                    return;
                }

                const txs = Object.values(data).filter(t => t.customerName.toLowerCase() === name.toLowerCase());

                if (txs.length === 0) {
                    showMsg('No transactions found', 'error');
                    return;
                }

                const total = txs.reduce((s, t) => s + t.totalAmount, 0);

                document.getElementById('spend-show').innerHTML = `
                    <div class="summary">
                        <div class="summary-row summary-total">
                            <span>Total Spent:</span>
                            <span>₹${total.toFixed(2)}</span>
                        </div>
                    </div>
                    ${txs.reverse().map(t => `
                        <div class="tx">
                            <div class="tx-name">₹${t.totalAmount.toFixed(2)}</div>
                            <div class="tx-items">${t.items.map(i => i.qty + '× ' + i.name).join(', ')}</div>
                            <div class="tx-time">${t.timestamp}</div>
                        </div>
                    `).join('')}
                `;
                showMsg('Spending loaded', 'success');
            } catch (err) {
                showMsg('Error: ' + err.message, 'error');
            }
        }

        // ===== UI =====
        function showStore() {
            document.getElementById('store').classList.add('show');
            document.getElementById('customer').classList.remove('show');
            document.querySelectorAll('.buttons .btn')[0].classList.add('active');
            document.querySelectorAll('.buttons .btn')[1].classList.remove('active');
            loadLedger();
        }

        function showCustomer() {
            document.getElementById('store').classList.remove('show');
            document.getElementById('customer').classList.add('show');
            document.querySelectorAll('.buttons .btn')[0].classList.remove('active');
            document.querySelectorAll('.buttons .btn')[1].classList.add('active');
        }

        function showMsg(text, type) {
            const msg = document.getElementById('msg');
            msg.textContent = text;
            msg.className = 'msg show msg-' + type;
            setTimeout(() => msg.className = 'msg', 3000);
        }

        // INIT
        loadLedger();

        // Auto-load receipt from URL
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const rx = params.get('rx');
            if (rx) {
                showCustomer();
                setTimeout(() => {
                    document.getElementById('rx-code').value = rx;
                    loadRx();
                }, 300);
            }
        });
    </script>
</body>
</html>
