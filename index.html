<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirana</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode.js/1.5.3/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #667eea;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 10px;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .header p { color: #666; font-size: 12px; }
        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            background: white;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
        }
        .btn:hover { border-color: #667eea; }
        .btn.active { background: #667eea; color: white; border-color: #667eea; }
        .content { display: none; }
        .content.show { display: block; }
        .section { margin-bottom: 20px; }
        .section-title { font-size: 12px; color: #667eea; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        input { width: 100%; padding: 10px; border: 2px solid #eee; border-radius: 6px; margin-bottom: 8px; font-size: 13px; }
        input:focus { outline: none; border-color: #667eea; background: #f9f9ff; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background: #667eea; color: white; font-weight: bold; cursor: pointer; margin-bottom: 8px; font-size: 13px; }
        button:hover { background: #5568d3; }
        .btn-success { background: #10b981; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .voice-btn { background: #10b981; padding: 15px; font-size: 16px; font-weight: bold; }
        .voice-btn.listening { background: #f59e0b; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .list { background: #f9f9f9; border-radius: 6px; padding: 10px; margin-bottom: 10px; }
        .item { background: white; padding: 10px; margin-bottom: 5px; border-radius: 6px; border-left: 3px solid #667eea; display: flex; justify-content: space-between; align-items: center; }
        .item-left { flex: 1; }
        .item-name { font-weight: bold; font-size: 13px; }
        .item-qty { font-size: 11px; color: #666; }
        .item-price { font-weight: bold; color: #667eea; }
        .remove { background: #fee2e2; color: #991b1b; padding: 4px 8px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; }
        .summary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .summary-total { font-size: 18px; font-weight: bold; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 8px; }
        .msg { padding: 10px; border-radius: 6px; margin-bottom: 15px; text-align: center; display: none; font-size: 12px; }
        .msg.show { display: block; }
        .msg-success { background: #d1fae5; color: #065f46; }
        .msg-error { background: #fee2e2; color: #991b1b; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 999; }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-box { background: white; padding: 30px; border-radius: 10px; text-align: center; width: 90%; max-width: 400px; }
        .modal-box h2 { margin-bottom: 15px; }
        .modal-box canvas { margin: 15px 0; }
        .tx-list { background: #f9f9f9; border-radius: 6px; padding: 10px; max-height: 250px; overflow-y: auto; }
        .tx { background: white; padding: 10px; margin-bottom: 5px; border-radius: 6px; border-left: 3px solid #10b981; font-size: 12px; }
        .tx-name { font-weight: bold; margin-bottom: 3px; }
        .tx-items { color: #666; font-size: 11px; margin-bottom: 3px; }
        .tx-time { color: #999; font-size: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏪 Kirana</h1>
            <p>Store Ledger & Customer Tracker</p>
        </div>

        <div id="msg" class="msg"></div>

        <div class="buttons">
            <button class="btn active" id="btn-store" onclick="showStore()">🏬 Store</button>
            <button class="btn" id="btn-customer" onclick="showCustomer()">👤 Customer</button>
        </div>

        <!-- STORE VIEW -->
        <div id="store-content" class="content show">
            <div class="section">
                <div class="section-title">🎤 Voice</div>
                <button class="voice-btn" id="voice-btn">🎤 Tap to Speak</button>
                <p style="font-size: 11px; color: #999; margin-top: 8px;">Say: "2 maggi 10"</p>
            </div>

            <div class="section">
                <div class="section-title">⌨️ Type</div>
                <input type="text" id="name" placeholder="Item">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <input type="number" id="qty" placeholder="Qty" value="1" min="1">
                    <input type="number" id="price" placeholder="Price" min="0" step="0.01">
                </div>
                <button onclick="addItem()">+ Add</button>
            </div>

            <div id="cart-section" style="display: none;">
                <div class="section">
                    <div class="section-title">🛒 Items</div>
                    <div class="list" id="items"></div>
                </div>
            </div>

            <div class="summary">
                <div class="summary-row">
                    <span>Items:</span>
                    <span id="count">0</span>
                </div>
                <div class="summary-row">
                    <span>Total Qty:</span>
                    <span id="total-qty">0</span>
                </div>
                <div class="summary-row summary-total">
                    <span>TOTAL:</span>
                    <span id="total">₹0</span>
                </div>
            </div>

            <input type="text" id="customer" placeholder="Customer name (optional)">
            <button class="btn-success" onclick="completeSale()">✓ Complete</button>
            <button class="btn-secondary" onclick="clearCart()">Clear</button>

            <div class="section" style="margin-top: 20px;">
                <div class="section-title">📊 Ledger</div>
                <div class="summary">
                    <div class="summary-row summary-total">
                        <span>Today:</span>
                        <span id="today-total">₹0</span>
                    </div>
                </div>
                <div class="tx-list" id="ledger"></div>
            </div>
        </div>

        <!-- CUSTOMER VIEW -->
        <div id="customer-content" class="content">
            <div class="section">
                <div class="section-title">📜 Receipt</div>
                <input type="text" id="receipt-code" placeholder="Code or QR link">
                <button onclick="loadReceipt()">Load</button>
            </div>

            <div id="receipt-box" style="display: none;">
                <div class="summary">
                    <div class="summary-row">
                        <span id="receipt-name">Store</span>
                        <span id="receipt-total" style="color: white;">₹0</span>
                    </div>
                </div>
                <div id="receipt-items" class="section"></div>
                <button class="btn-success" onclick="payNow()">💳 Pay</button>
            </div>

            <div class="section" style="margin-top: 20px;">
                <div class="section-title">💰 Spending</div>
                <input type="text" id="spending-name" placeholder="Your name">
                <button onclick="loadSpending()">Load</button>
            </div>
            <div id="spending-box"></div>
        </div>
    </div>

    <!-- QR MODAL -->
    <div id="qr-modal" class="modal">
        <div class="modal-box">
            <h2>✓ Sale Done!</h2>
            <p>Share QR with customer:</p>
            <div id="qr"></div>
            <p id="link" style="font-size: 11px; color: #667eea; word-break: break-all; margin: 10px 0;"></p>
            <button class="btn-secondary" onclick="downloadQR()" style="margin-bottom: 8px;">Download</button>
            <button class="btn-secondary" onclick="closeQR()">Close</button>
        </div>
    </div>

    <script>
        // FIREBASE
        const config = {
            apiKey: "AIzaSyAqqvJtnVu4-Z_RbKE2fjn4mm62p4U55UE",
            authDomain: "kirana-64484.firebaseapp.com",
            projectId: "kirana-64484",
            storageBucket: "kirana-64484.firebasestorage.app",
            messagingSenderId: "863149395918",
            appId: "1:863149395918:web:cb59d030a90b0f193be59f",
            measurementId: "G-FXHT6Q742W"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        firebase.auth().signInAnonymously();

        // STATE
        let cart = [];
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = SpeechRecognition ? new SpeechRecognition() : null;
        let listening = false;

        if (recognition) {
            recognition.language = 'en-IN';
            recognition.onstart = () => {
                listening = true;
                document.getElementById('voice-btn').classList.add('listening');
                document.getElementById('voice-btn').textContent = '🔴 Listening...';
            };
            recognition.onresult = (e) => {
                let text = '';
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    text += e.results[i][0].transcript + ' ';
                }
                parseVoice(text);
            };
            recognition.onend = () => {
                listening = false;
                document.getElementById('voice-btn').classList.remove('listening');
                document.getElementById('voice-btn').textContent = '🎤 Tap to Speak';
            };
        }

        // VOICE
        document.getElementById('voice-btn').addEventListener('click', () => {
            if (recognition && !listening) {
                recognition.start();
            }
        });

        function parseVoice(text) {
            text = text.toLowerCase().trim();
            const parts = text.split(/\s+/);
            let qty = 1, name = '', price = 0;
            for (let i = 0; i < parts.length; i++) {
                const n = parseFloat(parts[i]);
                if (!isNaN(n)) {
                    if (qty === 1 && i === 0) qty = n;
                    else price = n;
                } else {
                    name += parts[i] + ' ';
                }
            }
            if (name.trim()) {
                document.getElementById('name').value = name.trim();
                document.getElementById('qty').value = qty;
                if (price > 0) document.getElementById('price').value = price;
                addItem();
            }
        }

        // CART
        function addItem() {
            const name = document.getElementById('name').value.trim();
            const qty = parseInt(document.getElementById('qty').value) || 1;
            const price = parseFloat(document.getElementById('price').value) || 0;
            if (!name) { showMsg('Enter item name', 'error'); return; }
            cart.push({ id: Date.now(), name, qty, price, total: qty * price });
            document.getElementById('name').value = '';
            document.getElementById('qty').value = '1';
            document.getElementById('price').value = '';
            updateCart();
        }

        function removeItem(id) {
            cart = cart.filter(i => i.id !== id);
            updateCart();
        }

        function updateCart() {
            if (cart.length === 0) {
                document.getElementById('cart-section').style.display = 'none';
                return;
            }
            document.getElementById('cart-section').style.display = 'block';
            document.getElementById('items').innerHTML = cart.map(i => `
                <div class="item">
                    <div class="item-left">
                        <div class="item-name">${i.name}</div>
                        <div class="item-qty">×${i.qty} @ ₹${i.price}</div>
                    </div>
                    <div class="item-price">₹${i.total.toFixed(2)}</div>
                    <button class="remove" onclick="removeItem(${i.id})">✕</button>
                </div>
            `).join('');
            const qty = cart.reduce((s, i) => s + i.qty, 0);
            const tot = cart.reduce((s, i) => s + i.total, 0);
            document.getElementById('count').textContent = cart.length;
            document.getElementById('total-qty').textContent = qty;
            document.getElementById('total').textContent = '₹' + tot.toFixed(2);
        }

        function clearCart() {
            cart = [];
            document.getElementById('customer').value = '';
            updateCart();
        }

        // SALE
        async function completeSale() {
            if (cart.length === 0) { showMsg('Add items', 'error'); return; }
            const cname = document.getElementById('customer').value || 'Walk-in';
            const tot = cart.reduce((s, i) => s + i.total, 0);
            const id = Date.now().toString();
            try {
                await db.ref('transactions/' + id).set({
                    id, customerName: cname, items: cart, totalAmount: tot,
                    timestamp: new Date().toLocaleString('en-IN'),
                    date: new Date().toISOString().split('T')[0]
                });
                const link = window.location.href.split('?')[0] + '?rx=' + id;
                document.getElementById('link').textContent = link;
                document.getElementById('qr').innerHTML = '';
                new QRCode(document.getElementById('qr'), { text: link, width: 150, height: 150 });
                document.getElementById('qr-modal').classList.add('show');
                cart = [];
                document.getElementById('customer').value = '';
                updateCart();
                loadLedger();
            } catch (e) { showMsg('Error: ' + e.message, 'error'); }
        }

        function closeQR() { document.getElementById('qr-modal').classList.remove('show'); }
        function downloadQR() {
            const c = document.querySelector('#qr canvas');
            const a = document.createElement('a');
            a.href = c.toDataURL();
            a.download = 'receipt.png';
            a.click();
        }

        // LEDGER
        function loadLedger() {
            const today = new Date().toISOString().split('T')[0];
            db.ref('transactions').on('value', (s) => {
                const data = s.val();
                const list = data ? Object.values(data).filter(t => t.date === today).reverse() : [];
                let total = 0;
                document.getElementById('ledger').innerHTML = list.map(t => {
                    total += t.totalAmount;
                    return `
                        <div class="tx">
                            <div class="tx-name">${t.customerName} <span style="color: #667eea;">₹${t.totalAmount.toFixed(2)}</span></div>
                            <div class="tx-items">${t.items.map(i => i.qty + '× ' + i.name).join(', ')}</div>
                            <div class="tx-time">${t.timestamp}</div>
                        </div>
                    `;
                }).join('');
                document.getElementById('today-total').textContent = '₹' + total.toFixed(2);
            });
        }

        // CUSTOMER
        async function loadReceipt() {
            const code = document.getElementById('receipt-code').value.trim();
            if (!code) { showMsg('Enter code', 'error'); return; }
            const id = code.includes('rx=') ? code.split('rx=')[1] : code;
            try {
                const s = await db.ref('transactions/' + id).get();
                if (!s.exists()) { showMsg('Not found', 'error'); return; }
                const t = s.val();
                document.getElementById('receipt-name').textContent = t.customerName;
                document.getElementById('receipt-total').textContent = '₹' + t.totalAmount.toFixed(2);
                document.getElementById('receipt-items').innerHTML = t.items.map(i => 
                    `<div style="margin-bottom: 8px;">• ${i.qty}× ${i.name} = ₹${i.total.toFixed(2)}</div>`
                ).join('');
                document.getElementById('receipt-box').style.display = 'block';
            } catch (e) { showMsg('Error', 'error'); }
        }

        function payNow() {
            const amt = document.getElementById('receipt-total').textContent.replace('₹', '');
            window.open('upi://pay?pa=9999999999@paytm&pn=Store&am=' + amt);
        }

        async function loadSpending() {
            const name = document.getElementById('spending-name').value.trim();
            if (!name) { showMsg('Enter name', 'error'); return; }
            try {
                const s = await db.ref('transactions').get();
                const data = s.val();
                if (!data) { showMsg('No data', 'error'); return; }
                const list = Object.values(data).filter(t => t.customerName.toLowerCase() === name.toLowerCase());
                if (list.length === 0) { showMsg('Not found', 'error'); return; }
                const total = list.reduce((s, t) => s + t.totalAmount, 0);
                document.getElementById('spending-box').innerHTML = `
                    <div class="summary">
                        <div class="summary-row summary-total">
                            <span>Total Spent:</span>
                            <span>₹${total.toFixed(2)}</span>
                        </div>
                    </div>
                    ${list.reverse().map(t => `
                        <div class="tx">
                            <div class="tx-name">₹${t.totalAmount.toFixed(2)}</div>
                            <div class="tx-items">${t.items.map(i => i.qty + '× ' + i.name).join(', ')}</div>
                            <div class="tx-time">${t.timestamp}</div>
                        </div>
                    `).join('')}
                `;
            } catch (e) { showMsg('Error', 'error'); }
        }

        // UI
        function showStore() {
            document.getElementById('store-content').classList.add('show');
            document.getElementById('customer-content').classList.remove('show');
            document.getElementById('btn-store').classList.add('active');
            document.getElementById('btn-customer').classList.remove('active');
            loadLedger();
        }

        function showCustomer() {
            document.getElementById('store-content').classList.remove('show');
            document.getElementById('customer-content').classList.add('show');
            document.getElementById('btn-store').classList.remove('active');
            document.getElementById('btn-customer').classList.add('active');
        }

        function showMsg(text, type) {
            const m = document.getElementById('msg');
            m.textContent = text;
            m.className = 'msg show msg-' + type;
            setTimeout(() => m.className = 'msg', 3000);
        }

        loadLedger();

        // Auto load receipt from URL
        window.addEventListener('load', () => {
            const p = new URLSearchParams(window.location.search);
            const rx = p.get('rx');
            if (rx) {
                showCustomer();
                setTimeout(() => {
                    document.getElementById('receipt-code').value = rx;
                    loadReceipt();
                }, 300);
            }
        });
    </script>
</body>
</html>
