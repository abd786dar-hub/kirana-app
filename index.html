<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirana - Store Ledger</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 16px;
        }
        .header {
            text-align: center;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .header h1 { font-size: 28px; color: #333; margin-bottom: 4px; }
        .header p { color: #666; font-size: 12px; }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            border-bottom: 2px solid #eee;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: transparent;
            color: #999;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }
        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .section { margin-bottom: 16px; }
        .section h2 {
            font-size: 12px;
            color: #667eea;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        input, button, select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            width: 100%;
            margin-bottom: 8px;
        }
        input {
            border: 2px solid #eee;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            background: #f9f9ff;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        button:hover { background: #5568d3; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        .btn-success { background: #10b981; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover { background: #dc2626; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-secondary:hover { background: #e0e0e0; }
        .voice-btn {
            background: #10b981;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
        }
        .voice-btn.listening {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .items-list {
            background: #f9f9f9;
            border-radius: 6px;
            padding: 8px;
            max-height: 180px;
            overflow-y: auto;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: white;
            margin-bottom: 4px;
            border-radius: 4px;
            border-left: 3px solid #667eea;
            font-size: 12px;
        }
        .item-name { flex: 1; font-weight: 500; }
        .item-qty { background: #eee; padding: 2px 6px; border-radius: 3px; margin: 0 6px; font-size: 11px; }
        .item-price { color: #667eea; font-weight: 600; min-width: 50px; text-align: right; }
        .remove-btn {
            background: #fee2e2;
            color: #991b1b;
            border: none;
            padding: 2px 6px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            margin-left: 4px;
        }
        .summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .summary-row.total {
            font-size: 16px;
            font-weight: 700;
            border-top: 1px solid rgba(255,255,255,0.3);
            padding-top: 6px;
        }
        .transactions {
            background: #f9f9f9;
            border-radius: 6px;
            padding: 8px;
            max-height: 300px;
            overflow-y: auto;
        }
        .transaction-item {
            background: white;
            padding: 8px;
            margin-bottom: 6px;
            border-radius: 4px;
            border-left: 3px solid #10b981;
            font-size: 12px;
        }
        .transaction-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .transaction-time { color: #999; font-size: 10px; }
        .status {
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 12px;
            text-align: center;
            display: none;
        }
        .status.show { display: block; }
        .status.success { background: #d1fae5; color: #065f46; }
        .status.error { background: #fee2e2; color: #991b1b; }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .row-2 input, .row-2 button {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏪 Kirana</h1>
            <p>Simple Store Ledger</p>
        </div>

        <div id="status" class="status"></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('entry')">📝 Entry</button>
            <button class="tab-btn" onclick="switchTab('ledger')">📊 Ledger</button>
        </div>

        <!-- ENTRY TAB -->
        <div id="entry" class="tab-content active">
            <div class="section">
                <h2>🎤 Quick Entry</h2>
                <button class="voice-btn" id="voiceBtn" onclick="startVoice()">
                    🎤 Tap to Speak
                </button>
                <p style="font-size: 11px; color: #999; margin-top: 4px;">Say: "2 maggi 10" (qty, item, price)</p>
            </div>

            <div class="section">
                <h2>⌨️ Or Type</h2>
                <div class="row-2">
                    <input type="text" id="itemInput" placeholder="Item name" onkeypress="if(event.key==='Enter') addItem()">
                    <input type="number" id="qtyInput" placeholder="Qty" value="1" min="1">
                </div>
                <input type="number" id="priceInput" placeholder="Price (₹)" step="0.01" min="0">
                <button onclick="addItem()">+ Add Item</button>
            </div>

            <div id="itemsSection" style="display: none;">
                <div class="section">
                    <h2>🛒 Items</h2>
                    <div class="items-list" id="itemsList"></div>
                </div>
            </div>

            <div class="summary">
                <div class="summary-row">
                    <span>Items:</span>
                    <span id="itemCount">0</span>
                </div>
                <div class="summary-row">
                    <span>Total Qty:</span>
                    <span id="totalQty">0</span>
                </div>
                <div class="summary-row total">
                    <span>TOTAL:</span>
                    <span id="totalAmount">₹0</span>
                </div>
            </div>

            <input type="text" id="customerName" placeholder="Customer name (optional)">
            <button class="btn-success" onclick="completeSale()">✓ Complete Sale</button>
            <button class="btn-secondary" onclick="clearCart()" style="margin-top: 4px;">Clear</button>
        </div>

        <!-- LEDGER TAB -->
        <div id="ledger" class="tab-content">
            <div class="section">
                <h2>📊 Today's Sales</h2>
                <div class="summary">
                    <div class="summary-row total">
                        <span>TOTAL:</span>
                        <span id="todayTotal">₹0</span>
                    </div>
                </div>
                <div class="transactions" id="transactionsList"></div>
            </div>
        </div>
    </div>

    <script>
        // ============ FIREBASE CONFIG ============
        // ⚠️ REPLACE THESE 8 VALUES WITH YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyAqqvJtnVu4-Z_RbKE2fjn4mm62p4U55UE",
            authDomain: "kirana-64484.firebaseapp.com",
            projectId: "kirana-64484",
            storageBucket: "kirana-64484.firebasestorage.app",
            messagingSenderId: "863149395918",
            appId: "1:863149395918:web:cb59d030a90b0f193be59f",
            measurementId: "G-FXHT6Q742W"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        auth.signInAnonymously().catch(err => console.log('Auth:', err.message));

        // ============ STATE ============
        let cart = [];
        let listening = false;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;

        if (recognition) {
            recognition.language = 'en-IN';
            recognition.continuous = false;
            recognition.onstart = () => {
                listening = true;
                document.getElementById('voiceBtn').classList.add('listening');
                document.getElementById('voiceBtn').textContent = '🔴 Listening...';
            };
            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                document.getElementById('itemInput').value = transcript.trim();
            };
            recognition.onend = () => {
                listening = false;
                document.getElementById('voiceBtn').classList.remove('listening');
                document.getElementById('voiceBtn').textContent = '🎤 Tap to Speak';
                document.getElementById('itemInput').focus();
            };
        }

        // ============ FUNCTIONS ============
        function startVoice() {
            if (recognition && !listening) recognition.start();
        }

        function addItem() {
            const itemInput = document.getElementById('itemInput');
            const qtyInput = document.getElementById('qtyInput');
            const priceInput = document.getElementById('priceInput');

            const itemName = itemInput.value.trim();
            const qty = parseInt(qtyInput.value) || 1;
            const price = parseFloat(priceInput.value) || 0;

            if (!itemName) {
                showStatus('Enter item name', 'error');
                return;
            }

            cart.push({
                id: Date.now(),
                name: itemName,
                qty: qty,
                price: price,
                total: qty * price
            });

            itemInput.value = '';
            qtyInput.value = '1';
            priceInput.value = '';
            itemInput.focus();

            updateUI();
            showStatus(`✓ ${qty}× ${itemName} @ ₹${price} added`, 'success');
        }

        function removeItem(id) {
            cart = cart.filter(item => item.id !== id);
            updateUI();
        }

        function updateUI() {
            const section = document.getElementById('itemsSection');
            const list = document.getElementById('itemsList');

            if (cart.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            list.innerHTML = cart.map(item => `
                <div class="item-row">
                    <div class="item-name">${item.name}</div>
                    <div class="item-qty">×${item.qty}</div>
                    <div class="item-price">₹${item.total.toFixed(2)}</div>
                    <button class="remove-btn" onclick="removeItem(${item.id})">✕</button>
                </div>
            `).join('');

            const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
            const totalAmount = cart.reduce((sum, item) => sum + item.total, 0);

            document.getElementById('itemCount').textContent = cart.length;
            document.getElementById('totalQty').textContent = totalQty;
            document.getElementById('totalAmount').textContent = '₹' + totalAmount.toFixed(2);
        }

        function clearCart() {
            if (confirm('Clear all items?')) {
                cart = [];
                document.getElementById('customerName').value = '';
                updateUI();
                showStatus('Cart cleared', 'error');
            }
        }

        async function completeSale() {
            if (cart.length === 0) {
                showStatus('Add items first', 'error');
                return;
            }

            const customerName = document.getElementById('customerName').value || 'Walk-in';
            const totalAmount = cart.reduce((sum, item) => sum + item.total, 0);

            const transaction = {
                id: Date.now().toString(),
                customerName: customerName,
                items: cart,
                totalAmount: totalAmount,
                timestamp: new Date().toLocaleString('en-IN'),
                date: new Date().toISOString().split('T')[0]
            };

            try {
                await db.ref('transactions/' + transaction.id).set(transaction);
                showStatus(`✓ Sale completed! ₹${totalAmount.toFixed(2)}`, 'success');
                cart = [];
                document.getElementById('customerName').value = '';
                updateUI();
                loadTransactions();
            } catch (err) {
                showStatus('Error: ' + err.message, 'error');
            }
        }

        function loadTransactions() {
            const today = new Date().toISOString().split('T')[0];
            db.ref('transactions').on('value', (snapshot) => {
                const data = snapshot.val();
                const txArray = data ? Object.values(data).filter(tx => tx.date === today).reverse() : [];

                document.getElementById('transactionsList').innerHTML = txArray.map(tx => `
                    <div class="transaction-item">
                        <div class="transaction-header">
                            <span>${tx.customerName}</span>
                            <span style="color: #667eea;">₹${tx.totalAmount.toFixed(2)}</span>
                        </div>
                        <div style="color: #666; font-size: 11px;">${tx.items.map(item => `${item.qty}× ${item.name}`).join(', ')}</div>
                        <div class="transaction-time">${tx.timestamp}</div>
                    </div>
                `).join('');

                const todayTotal = txArray.reduce((sum, tx) => sum + tx.totalAmount, 0);
                document.getElementById('todayTotal').textContent = '₹' + todayTotal.toFixed(2);
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
            if (tab === 'ledger') loadTransactions();
        }

        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status show ' + type;
            setTimeout(() => el.className = 'status', 3000);
        }

        loadTransactions();
    </script>
</body>
</html>
